services:
  api1:
    build: ./src
    container_name: api1
    
    depends_on:
      mongo:
        condition: service_started

      redis:
        condition: service_healthy

      kafka:
        condition: service_healthy

  api2:
    build: ./src
    container_name: api2

    depends_on:
      mongo:
        condition: service_started

      redis:
        condition: service_healthy

      kafka:
        condition: service_healthy
      
  # NOTE: [AI Citation] Redis caching service was added with help from Claude Code
  redis:
    image: redis:latest
    container_name: redis

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  mongo:
    image: mongo:latest

    # NOTE: Not necessary, but I plan on doing some testing with compass
    ports:
      - "27017:27017"

    # NOTE: Necessary for persisting data past container lifetime cycle
    volumes:
      - mongodb-data:/data/db

  email-service:
    build: ./src/email-service
    container_name: email-service
        
    depends_on:
      kafka:
        condition: service_healthy
        
  nginx:
    build: ./nginx
    
    ports:
      - "8080:80"
    
    depends_on:
      - api1
      - api2

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    
    ports:
      - "9092:9092"
    
    environment:
      KAFKA_LISTENERS: HOST://0.0.0.0:9092,CONTROLLER://localhost:9091
      KAFKA_ADVERTISED_LISTENERS: HOST://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: HOST:PLAINTEXT,CONTROLLER:PLAINTEXT

      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9091

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_INTER_BROKER_LISTENER_NAME: HOST

    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
      interval: 5s
      retries: 10

  # NOTE: [AI Citation] exporters, promtheus, and grafana sections were generated by chatGPT
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter

    command:
      - "--kafka.server=kafka:9092"

    depends_on:
      kafka:
        condition: service_healthy

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-exporter

    command:
      - "--nginx.scrape-uri=http://nginx:80/stub_status"

    depends_on:
      - nginx

  mongodb-exporter:
    image: percona/mongodb_exporter:0.40
    container_name: mongodb-exporter

    command:
      - "--mongodb.uri=mongodb://mongo:27017"
      - "--collect-all"
   
    depends_on:
        - mongo

  prometheus:
    build: ./prometheus
    container_name: prometheus

    ports:
      - "9090:9090"

    depends_on:
      - api1
      - api2
      - kafka-exporter
      - mongodb-exporter
      - nginx-exporter

  grafana:
    image: grafana/grafana:latest
    container_name: grafana

    ports:
      - "3000:3000"

    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=notadmin123!
      - GF_USERS_ALLOW_SIGN_UP=false

    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards

    depends_on:
      - prometheus
    
volumes:
  mongodb-data:
  grafana-data:
  
